services:
  - type: web
    name: cartotv
    runtime: node
    region: oregon
    plan: starter
    buildCommand: >
      npm install --legacy-peer-deps &&
      (npm run fetch-channels || true) &&
      npm run build &&
      cp -r public .next/standalone/public &&
      cp -r .next/static .next/standalone/.next/static
    startCommand: node .next/standalone/server.js
    healthCheckPath: /en
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=1536
      - key: PORT
        value: 10000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
    autoDeploy: true
